name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 */6 * * *'  # Every 6h, 30min after registry scraper
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest skills index from registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-index.mjs

      - name: Build static site
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out \
            --project-name=trustedskills \
            --commit-dirty=true \
            --branch=main
