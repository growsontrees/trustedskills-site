name: Deploy to Elestio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via n8n SSH runner
        run: |
          curl -s -X POST "${{ secrets.N8N_SSH_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"command\": \"cd /opt/trustedskills && git pull origin main && npm install --production=false && GITHUB_TOKEN=${{ secrets.REGISTRY_TOKEN }} npm run build && test -f .next/standalone/server.js || exit 1 && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static && pm2 delete trustedskills 2>/dev/null; PORT=3000 pm2 start .next/standalone/server.js --name trustedskills && echo DEPLOYED_OK\"}"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}'
