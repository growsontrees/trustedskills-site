name: Deploy to Elestio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via n8n SSH runner
        run: |
          curl -s -X POST "${{ secrets.N8N_SSH_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"command\": \"cd /opt/trustedskills && git pull origin main && npm ci && GITHUB_TOKEN=${{ secrets.REGISTRY_TOKEN }} npm run build && pm2 restart trustedskills\"}"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}'
